name: Build APK Gradle 931

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "platform-tools"
          echo "$ANDROID_HOME/build-tools/36.0.0" >> "$GITHUB_PATH"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
      - name: Build
        shell: bash
        run: |
          mkdir -p out
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          EOF
          keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          python3 - <<'PY'
          from pathlib import Path
          p = Path('app/build.gradle.kts')
          s = p.read_text()
          s = s.replace('compileSdk { version = release(36) { minorApiLevel = 1 } }', 'compileSdk = 36')
          p.write_text(s)
          PY
          set +e
          gradle --no-daemon --stacktrace :app:assembleDebug > out/gradle-build.log 2>&1
          echo $? > out/gradle-exit-code.txt
          set -e
          find . -type f -name '*.apk' -exec ls -lh {} \; > out/apk-list.txt || true
          built=$(find app/build/outputs -type f -name '*.apk' 2>/dev/null | sort | head -n 1 || true)
          test -n "$built"
          unzip -t "$built" > out/zip-test.txt
          apksigner verify --verbose "$built" > out/apksigner-verify.txt
          cp "$built" out/SpaceWise-debug.apk
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SpaceWise-build-logs
          path: out/*.txt
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        with:
          name: SpaceWise-debug-apk
          path: out/SpaceWise-debug.apk
          if-no-files-found: error
