name: Build And Publish Debug APK

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  apk:
    name: Produce installable debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        shell: bash
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "platform-tools"
          echo "$ANDROID_HOME/build-tools/36.0.0" >> "$GITHUB_PATH"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Prepare local Android files
        shell: bash
        run: |
          mkdir -p out
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          EOF
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Run unit tests and assemble from source
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace :app:testDebugUnitTest :app:assembleDebug 2>&1 | tee out/gradle-build.log

      - name: Verify source-built APK
        shell: bash
        run: |
          apk=$(find app/build/outputs/apk/debug -type f -name '*.apk' | sort | head -n 1)
          test -n "$apk"
          test -s "$apk"
          unzip -t "$apk" | tee out/zip-test.txt
          apksigner verify --verbose "$apk" | tee out/apksigner-verify.txt
          cp "$apk" out/SpaceWise-debug.apk
          sha256sum out/SpaceWise-debug.apk | tee out/SpaceWise-debug.apk.sha256

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SpaceWise-apk-diagnostics
          path: |
            out/gradle-build.log
            out/zip-test.txt
            out/apksigner-verify.txt
            out/SpaceWise-debug.apk.sha256
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceWise-debug-apk
          path: out/SpaceWise-debug.apk
          if-no-files-found: error