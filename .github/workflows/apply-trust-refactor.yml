name: Apply Trust Refactor

on:
  push:
    branches:
      - chatgpt/trust-model-refactor
    paths:
      - tools/apply_trust_refactor.py
      - .github/workflows/apply-trust-refactor.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout refactor branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt/trust-model-refactor
          fetch-depth: 0

      - name: Apply deterministic refactor
        run: python3 tools/apply_trust_refactor.py

      - name: Repair Kotlin constructor reference
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('app/src/main/java/com/stinkyweasel/spacewise/data/repository/StorageStatsRepository.kt')
          text = path.read_text()
          text = text.replace('uri.path?.let(::java.io.File)', 'uri.path?.let { pathValue -> java.io.File(pathValue) }')
          path.write_text(text)
          PY

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Generate Gradle wrapper 9.3.1
        run: gradle wrapper --gradle-version 9.3.1 --distribution-type bin

      - name: Commit applied refactor
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Fix trust-refactor compilation"
          git push origin HEAD:chatgpt/trust-model-refactor

